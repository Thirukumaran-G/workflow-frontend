name: Frontend — Production Deploy

on:
    push:
        branches:
            - main
    
    workflow_dispatch:
        inputs:
            reason:
                description: 'Reason for manual deploy'
                required: false
                default: 'Manual trigger'
env:
    PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    GCS_BUCKET: ${{ secrets.GCS_BUCKET_NAME }}

jobs:
    build:
        name: Build Production Bundle
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: '20'
                cache: 'npm'
            
            - run: npm ci

            - name: Build
              run: npm run build
              env:
                VITE_BACKEND_URL: ${{ secrets.BACKEND_URL }}
                NODE_ENV: production
            
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                name: frontend-prod-${{ github.sha }}
                path: dist/
                retention-days: 30 
            
    deploy-production:
        name: Deploy to GCS Production
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                name: frontend-prod-${{ github.sha }}
                path: dist/
            
            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                credentials_json: ${{ secrets.GCP_SA_KEY }}
            
            - name: Set up gcloud
              uses: google-github-actions/setup-gcloud@v2
            
            - name: Deploy to GCS (root of bucket)
              run: |
                gsutil -m rsync -r -d dist/ gs://${{ env.GCS_BUCKET }}
            
            - name: Set cache headers
              run: |
                gsutil setmeta -h "Cache-Control:no-cache, no-store, must-revalidate" \
                    gs://${{ env.GCS_BUCKET }}/index.html || true

                gsutil -m setmeta -h "Cache-Control:public, max-age=31536000, immutable" \
                     $(gsutil ls "gs://${{ env.GCS_BUCKET }}/assets/") 2>/dev/null || true
                
            - name: Smoke test frontend
              run: |
                BUCKET_URL="https://storage.googleapis.com/${{ env.GCS_BUCKET }}/index.html"
                HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${BUCKET_URL}")
                echo "Frontend smoke test: HTTP ${HTTP_STATUS}"
                if [ "${HTTP_STATUS}" != "200" ]; then
                    echo "Frontend smoke test FAILED"
                    exit 1
                fi
                echo "Frontend smoke test passed"
            
            - name: Deploy summary
              run: |
                echo "### ✅ Frontend Production Deploy" >> $GITHUB_STEP_SUMMARY
                echo "Bucket: gs://${{ env.GCS_BUCKET }}" >> $GITHUB_STEP_SUMMARY
                echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
